<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STUDIO 07 — 經營總覽 / Executive Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%23fff%22%2F%3E%3Ccircle%20cx%3D%2222%22%20cy%3D%2232%22%20r%3D%227%22%20fill%3D%22%2322C55E%22%2F%3E%3Ccircle%20cx%3D%2242%22%20cy%3D%2232%22%20r%3D%227%22%20fill%3D%22%23E2E8F0%22%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Executive Dashboard
     設計準則：一頁看完，不用捲動找答案。最多 6 個 KPI、
     大字級、大量留白、紅黃綠號誌。細節一律不放。
     ============================================================ */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#fbfbfc; --panel:#fff; --line:#e8eaee; --line-2:#f1f3f6;
    --ink:#12161d; --ink-2:#5a6373; --ink-3:#949cab;
    --green:#22c55e; --green-d:#15803d; --amber:#f59e0b; --amber-d:#b45309;
    --red:#ef4444; --red-d:#b91c1c; --accent:#12161d;
    --gap:20px;
  }
  body{
    background:var(--bg); color:var(--ink); min-height:100vh;
    font-family:'Inter','Noto Sans TC',system-ui,sans-serif; font-size:14px; line-height:1.55;
    -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums;
    letter-spacing:-.005em;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  .wrap{max-width:1280px; margin:0 auto; padding:clamp(28px,5vw,56px) clamp(20px,4vw,48px) 72px}

  /* ---------- 標題列 ---------- */
  header{
    display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;
    padding-bottom:26px; border-bottom:1px solid var(--line); margin-bottom:clamp(28px,4vw,44px);
  }
  .eyebrow{
    font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink-3); margin-bottom:11px;
  }
  h1{font-size:clamp(28px,3.6vw,42px); font-weight:600; letter-spacing:-.035em; line-height:1.1}
  h1 span{color:var(--ink-3); font-weight:300}
  .period{margin-top:9px; color:var(--ink-2); font-size:13.5px}
  .period b{font-weight:600; color:var(--ink)}
  .hactions{display:flex; gap:9px; align-items:center}
  .btn{
    height:34px; padding:0 14px; border:1px solid var(--line); border-radius:9px; background:#fff;
    font:inherit; font-size:12.5px; font-weight:500; color:var(--ink-2); cursor:pointer;
    display:inline-flex; align-items:center; gap:7px; white-space:nowrap; transition:.16s;
  }
  .btn:hover{border-color:#cdd2da; color:var(--ink)}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .btn[aria-pressed=true]{background:var(--ink); border-color:var(--ink); color:#fff}

  /* ---------- 總體號誌 ---------- */
  .verdict{
    display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:14px;
    background:#f0fdf4; border:1px solid #c7ebd5; margin-bottom:var(--gap);
  }
  .verdict.amber{background:#fffbeb; border-color:#f2ddb0}
  .verdict.red{background:#fef2f2; border-color:#f4cfcf}
  .verdict .lamp{display:flex; gap:6px; flex:none}
  .verdict .lamp i{width:11px; height:11px; border-radius:50%; background:#dfe3e9; display:block}
  .verdict.green .lamp i:nth-child(1){background:var(--green); box-shadow:0 0 0 4px rgba(34,197,94,.16)}
  .verdict.amber .lamp i:nth-child(2){background:var(--amber); box-shadow:0 0 0 4px rgba(245,158,11,.16)}
  .verdict.red   .lamp i:nth-child(3){background:var(--red);   box-shadow:0 0 0 4px rgba(239,68,68,.16)}
  .verdict .txt{font-size:14px; line-height:1.6}
  .verdict .txt b{font-weight:600}

  /* ---------- KPI ---------- */
  .kpis{
    display:grid; grid-template-columns:repeat(4,1fr); gap:var(--gap); margin-bottom:var(--gap);
  }
  .kpi{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:22px 24px 20px; position:relative; transition:box-shadow .25s,transform .25s;
  }
  .kpi:hover{box-shadow:0 8px 26px rgba(18,22,29,.07); transform:translateY(-2px)}
  .kpi .top{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .kpi .k{font-size:12.5px; color:var(--ink-2); font-weight:500}
  .light{width:9px; height:9px; border-radius:50%; flex:none}
  .light.g{background:var(--green); box-shadow:0 0 0 3.5px rgba(34,197,94,.15)}
  .light.a{background:var(--amber); box-shadow:0 0 0 3.5px rgba(245,158,11,.15)}
  .light.r{background:var(--red);   box-shadow:0 0 0 3.5px rgba(239,68,68,.15)}
  .kpi .v{
    font-size:clamp(38px,4.4vw,52px); font-weight:600; letter-spacing:-.05em; line-height:1.02;
    margin:14px 0 0; white-space:nowrap;
  }
  .kpi .v .u{font-size:16px; font-weight:500; color:var(--ink-3); letter-spacing:-.01em; margin-left:4px}
  .kpi .d{margin-top:10px; display:flex; align-items:center; gap:8px; font-size:12.5px; flex-wrap:wrap}
  .trend{
    display:inline-flex; align-items:center; gap:4px; font-weight:600; font-size:12px;
    font-family:'JetBrains Mono',monospace;
  }
  .trend.up{color:var(--green-d)} .trend.down{color:var(--red-d)} .trend.flat{color:var(--ink-3)}
  .kpi .note{color:var(--ink-3)}
  .kpi .spark{display:block; width:100%; height:34px; margin-top:14px}

  /* ---------- 兩欄 ---------- */
  .cols{display:grid; grid-template-columns:1.15fr 1fr; gap:var(--gap)}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:22px 24px 24px}
  .card h2{
    font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-3); margin-bottom:20px;
  }

  /* 目標達成 */
  .goal{padding:15px 0; border-bottom:1px solid var(--line-2)}
  .goal:last-child{border-bottom:0; padding-bottom:0}
  .goal .row1{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:9px}
  .goal .nm{font-size:13.5px; font-weight:500; display:flex; align-items:center; gap:8px}
  .goal .val{font-family:'JetBrains Mono',monospace; font-size:13.5px; font-weight:500}
  .goal .val small{color:var(--ink-3); font-weight:400; font-size:11.5px; margin-left:3px}
  .track{height:7px; background:#eef0f4; border-radius:5px; overflow:hidden; position:relative}
  /* display:block 不能省 —— span 預設是 inline，inline 元素吃不到 height */
  .track .fill{
    display:block; height:100%; border-radius:5px; width:0;
    transition:width 1.1s cubic-bezier(.2,.8,.2,1);
  }
  .track .target{
    position:absolute; top:-3px; bottom:-3px; width:1.5px; background:var(--ink-3); opacity:.55;
  }
  .goal .foot{display:flex; justify-content:space-between; margin-top:7px; font-size:11.5px; color:var(--ink-3)}

  /* 需要注意 */
  .att{display:flex; gap:14px; padding:15px 0; border-bottom:1px solid var(--line-2)}
  .att:last-child{border-bottom:0; padding-bottom:0}
  .att .ic{
    width:28px; height:28px; border-radius:9px; flex:none; display:grid; place-items:center;
    font-size:13px; font-weight:700;
  }
  .att.r .ic{background:#fef2f2; color:var(--red-d)}
  .att.a .ic{background:#fffbeb; color:var(--amber-d)}
  .att.g .ic{background:#f0fdf4; color:var(--green-d)}
  .att .b{min-width:0}
  .att .t{font-size:13.5px; font-weight:600; margin-bottom:3px; line-height:1.4}
  .att .s{font-size:12.5px; color:var(--ink-2); line-height:1.6}
  .att .s b{color:var(--ink); font-weight:600; font-family:'JetBrains Mono',monospace}

  /* 服務別 / 團隊 */
  .rows{margin-top:var(--gap); display:grid; grid-template-columns:1fr 1fr; gap:var(--gap)}
  .brow{display:grid; grid-template-columns:88px 1fr 76px; gap:12px; align-items:center; padding:9px 0}
  .brow .l{font-size:13px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .brow .bar{height:22px; background:#f3f5f8; border-radius:6px; overflow:hidden}
  .brow .bar i{display:block; height:100%; border-radius:6px; width:0;
    transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .brow .n{font-family:'JetBrains Mono',monospace; font-size:12.5px; text-align:right; color:var(--ink-2)}

  .person{display:grid; grid-template-columns:34px 1fr 62px; gap:12px; align-items:center; padding:10px 0}
  .person .av{
    width:34px; height:34px; border-radius:50%; background:#f1f3f6; color:var(--ink-2);
    display:grid; place-items:center; font-size:10.5px; font-weight:700;
    font-family:'JetBrains Mono',monospace;
  }
  .person .nm b{display:block; font-size:13px; font-weight:500}
  .person .nm i{font-style:normal; font-size:11.5px; color:var(--ink-3)}
  .person .load{text-align:right}
  .person .load b{font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; display:block}
  .person .load i{font-style:normal; font-size:10.5px; color:var(--ink-3)}

  footer{
    margin-top:36px; padding-top:22px; border-top:1px solid var(--line);
    display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
    color:var(--ink-3); font-size:12px; line-height:1.7;
  }

  /* ---------- 返回總覽 ---------- */
  .back{
    position:fixed; left:16px; bottom:16px; z-index:60; text-decoration:none;
    background:var(--ink); color:#fff; font-size:12px; font-weight:500;
    padding:9px 14px; border-radius:10px; box-shadow:0 6px 20px rgba(18,22,29,.22); transition:.18s;
  }
  .back:hover{transform:translateY(-2px); box-shadow:0 10px 26px rgba(18,22,29,.28)}
  .back:focus-visible{outline:2px solid var(--ink); outline-offset:2px}

  /* ---------- 響應式 ---------- */
  @media (max-width:1080px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .cols,.rows{grid-template-columns:1fr}
  }
  @media (max-width:560px){
    .kpis{grid-template-columns:1fr}
    header{align-items:flex-start}
  }

  /* ---------- 列印：經營層真的會把這頁印出來帶進會議 ---------- */
  @media print{
    body{background:#fff}
    .back,.hactions{display:none!important}
    .wrap{max-width:none; padding:0}
    .kpi,.card,.verdict{break-inside:avoid; box-shadow:none}
    .kpis{grid-template-columns:repeat(4,1fr)}
    .cols{grid-template-columns:1.15fr 1fr}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01ms!important; transition-duration:.01ms!important}
    .kpi:hover{transform:none}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <p class="eyebrow">STUDIO 07 · Executive Summary</p>
      <h1>經營總覽 <span>／ 一頁看完</span></h1>
      <p class="period">統計期間 <b id="periodLabel">2026 年 7 月</b> · 與 <b id="cmpLabel">上月</b>比較 · 資料截至 <b>2026-07-18</b></p>
    </div>
    <div class="hactions">
      <button class="btn" id="cmpBtn" aria-pressed="false">比較對象：上月</button>
      <button class="btn" id="printBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <path d="M6 9V3h12v6M6 18H4v-6h16v6h-2M8 14h8v7H8z"/>
        </svg>
        列印
      </button>
    </div>
  </header>

  <!-- ============ 總體號誌 ============ -->
  <div class="verdict green" id="verdict">
    <span class="lamp"><i></i><i></i><i></i></span>
    <span class="txt" id="verdictText"></span>
  </div>

  <!-- ============ KPI ============ -->
  <section class="kpis" id="kpis" aria-label="關鍵經營指標"></section>

  <!-- ============ 目標 / 注意事項 ============ -->
  <div class="cols">
    <section class="card">
      <h2>年度目標達成</h2>
      <div id="goals"></div>
    </section>

    <section class="card">
      <h2>需要注意的三件事</h2>
      <div id="attention"></div>
    </section>
  </div>

  <!-- ============ 服務別 / 團隊 ============ -->
  <div class="rows">
    <section class="card">
      <h2>服務別營收</h2>
      <div id="byService"></div>
    </section>

    <section class="card">
      <h2>團隊產能</h2>
      <div id="team"></div>
    </section>
  </div>

  <footer>
    <span>© 2026 STUDIO 07 零柒工作室 · 本頁數字為示範用途的虛構資料</span>
    <span>四個人，一隻貓 · 行政貓「麻糬」本月出勤率 100%</span>
  </footer>
</div>

<a class="back" href="../index.html">← 返回總覽</a>

<script>
'use strict';
/* ================================================================
   Executive Dashboard
   刻意不放圖表庫：火花線與長條都是手刻 SVG / CSS，
   整頁沒有外部相依，列印時也不會有 canvas 糊掉的問題。
   ================================================================ */

const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------------- 本月數字（與其他三個儀表板同一套設定） ---------------- */
const M = {
  revenue: 312,          // 萬元
  margin: 0.487,
  onTime: 0.86,
  utilization: 0.79,
  activeProjects: 23,
  newClients: 4,
  nps: 62,
};
/* 比較基準：上月 / 去年同期 */
const BASE = {
  mom: { revenue:288, margin:0.462, onTime:0.91, utilization:0.83, activeProjects:21, nps:58 },
  yoy: { revenue:241, margin:0.428, onTime:0.79, utilization:0.74, activeProjects:17, nps:49 },
};
let mode = 'mom';

/* 近 12 個月趨勢（給火花線用） */
const TREND = {
  revenue:      [232,214,247,268,255,271,264,249,281,296,288,312],
  margin:       [.41,.39,.44,.46,.45,.47,.46,.44,.47,.48,.462,.487],
  onTime:       [.82,.79,.85,.88,.86,.9,.92,.88,.9,.93,.91,.86],
  utilization:  [.71,.68,.75,.8,.78,.82,.85,.81,.84,.86,.83,.79],
};

const nf = new Intl.NumberFormat('zh-TW');
const pct = (v, d = 0) => (v * 100).toFixed(d) + '%';

/* ---------------- 火花線 ---------------- */
function sparkline(vals, color){
  const W = 300, H = 34, pad = 3;
  const min = Math.min(...vals), max = Math.max(...vals), span = max - min || 1;
  const pts = vals.map((v, i) => [
    pad + i * (W - pad * 2) / (vals.length - 1),
    H - pad - (v - min) / span * (H - pad * 2),
  ]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const id = 'sg' + Math.random().toString(36).slice(2, 8);
  const last = pts[pts.length - 1];
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${line} L${W - pad} ${H} L${pad} ${H} Z" fill="url(#${id})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.8"
          stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6" fill="${color}"/>
  </svg>`;
}

/* ---------------- 數字滾動 ---------------- */
function countUp(el, to, fmt, ms = 900){
  const from = Number(el.dataset.v ?? 0);
  el.dataset.v = to;
  if (reduce){ el.textContent = fmt(to); return; }
  const t0 = performance.now();
  (function step(t){
    const p = Math.min(1, (t - t0) / ms);
    el.textContent = fmt(from + (to - from) * (1 - Math.pow(1 - p, 3)));
    if (p < 1) requestAnimationFrame(step);
  })(t0);
}

/* ---------------- 號誌判定 ---------------- */
// g = 達標、a = 接近、r = 未達
function lamp(v, target, higherIsBetter = true){
  const ratio = higherIsBetter ? v / target : target / v;
  return ratio >= 1 ? 'g' : ratio >= 0.92 ? 'a' : 'r';
}
const COLOR = { g:'#22c55e', a:'#f59e0b', r:'#ef4444' };

/* ---------------- KPI ---------------- */
function renderKpis(){
  const b = BASE[mode];
  const d = (now, was) => (now - was) / was;

  const cards = [
    { k:'本月營收', v:M.revenue, fmt:v => nf.format(Math.round(v)), u:'萬',
      delta:d(M.revenue, b.revenue), light:lamp(M.revenue, 300),
      note:'目標 300 萬', trend:TREND.revenue },
    { k:'毛利率', v:M.margin * 100, fmt:v => v.toFixed(1), u:'%',
      delta:d(M.margin, b.margin), light:lamp(M.margin, .45),
      note:'目標 45%', trend:TREND.margin },
    { k:'準時交付率', v:M.onTime * 100, fmt:v => v.toFixed(0), u:'%',
      delta:d(M.onTime, b.onTime), light:lamp(M.onTime, .9),
      note:'目標 90%', trend:TREND.onTime },
    { k:'產能利用率', v:M.utilization * 100, fmt:v => v.toFixed(0), u:'%',
      delta:d(M.utilization, b.utilization), light:lamp(M.utilization, .85),
      note:'目標 85%', trend:TREND.utilization },
  ];

  const host = document.getElementById('kpis');
  if (host.children.length !== cards.length){
    host.innerHTML = cards.map(c => `
      <article class="kpi">
        <div class="top"><span class="k">${c.k}</span><span class="light"></span></div>
        <div class="v"><span class="n">0</span><span class="u">${c.u}</span></div>
        <div class="d"><span class="trend"></span><span class="note">${c.note}</span></div>
        <div class="sp"></div>
      </article>`).join('');
  }

  [...host.children].forEach((el, i) => {
    const c = cards[i];
    countUp(el.querySelector('.n'), c.v, c.fmt);
    el.querySelector('.light').className = 'light ' + c.light;
    const t = el.querySelector('.trend');
    t.className = 'trend ' + (Math.abs(c.delta) < .002 ? 'flat' : c.delta > 0 ? 'up' : 'down');
    t.textContent = (c.delta > 0 ? '▲ ' : c.delta < 0 ? '▼ ' : '— ') +
                    Math.abs(c.delta * 100).toFixed(1) + '%';
    el.querySelector('.sp').innerHTML = sparkline(c.trend, COLOR[c.light]);
  });

  renderVerdict(cards);
}

/* ---------------- 一句話結論 ---------------- */
function renderVerdict(cards){
  const bad = cards.filter(c => c.light === 'r').length;
  const warn = cards.filter(c => c.light === 'a').length;
  const el = document.getElementById('verdict');
  const cmp = mode === 'mom' ? '上月' : '去年同期';

  let cls, msg;
  if (bad === 0 && warn === 0){
    cls = 'green';
    msg = `<b>四項核心指標全數達標。</b>營收較${cmp}成長，毛利率站上目標線，可維持現有節奏。`;
  } else if (bad === 0){
    cls = 'amber';
    msg = `<b>整體健康，${warn} 項指標接近但未達標。</b>營收與毛利表現良好，` +
          `但交付與產能需要留意，建議在下次週會確認排程。`;
  } else {
    cls = 'red';
    msg = `<b>${bad} 項指標未達標，需要決策介入。</b>` +
          `營收面尚可，問題集中在交付與產能，建議優先處理人力配置。`;
  }
  el.className = 'verdict ' + cls;
  document.getElementById('verdictText').innerHTML = msg;
}

/* ---------------- 年度目標 ---------------- */
const GOALS = [
  { nm:'年度營收', now:2148, target:3600, unit:'萬', pace:.58,
    note:'已過 7 個月（58% 時程）' },
  { nm:'新客戶開發', now:19, target:24, unit:'家', pace:.58,
    note:'本月新增 4 家' },
  { nm:'準時交付率', now:88, target:90, unit:'%', pace:null,
    note:'年度累計' },
  { nm:'客戶回訪率', now:63, target:55, unit:'%', pace:null,
    note:'已超標 8 個百分點' },
];
function renderGoals(){
  document.getElementById('goals').innerHTML = GOALS.map(g => {
    const ratio = g.now / g.target;
    const l = g.pace !== null
      ? (ratio >= g.pace ? 'g' : ratio >= g.pace * .92 ? 'a' : 'r')
      : lamp(g.now, g.target);
    return `
      <div class="goal">
        <div class="row1">
          <span class="nm"><span class="light ${l}"></span>${g.nm}</span>
          <span class="val">${nf.format(g.now)}<small>/ ${nf.format(g.target)} ${g.unit}</small></span>
        </div>
        <div class="track">
          <span class="fill" data-w="${Math.min(100, ratio * 100).toFixed(1)}"
                style="background:${COLOR[l]}"></span>
          ${g.pace !== null ? `<span class="target" style="left:${(g.pace * 100).toFixed(1)}%"
             title="依時程應達 ${pct(g.pace)}"></span>` : ''}
        </div>
        <div class="foot"><span>${g.note}</span><span>${pct(ratio)}</span></div>
      </div>`;
  }).join('');

  // 下一格再套寬度，讓 transition 有起點可以動
  requestAnimationFrame(() => {
    document.querySelectorAll('#goals .fill').forEach(f => f.style.width = f.dataset.w + '%');
  });
}

/* ---------------- 服務別營收 ---------------- */
const BY_SERVICE = [
  { nm:'網頁設計', v:128, c:'#12161d' },
  { nm:'品牌識別', v:86,  c:'#464e5c' },
  { nm:'互動裝置', v:62,  c:'#6b7382' },
  { nm:'動態影像', v:36,  c:'#a8afbb' },
];
function renderService(){
  const max = Math.max(...BY_SERVICE.map(s => s.v));
  document.getElementById('byService').innerHTML = BY_SERVICE.map(s => `
    <div class="brow">
      <span class="l">${s.nm}</span>
      <span class="bar"><i data-w="${(s.v / max * 100).toFixed(1)}" style="background:${s.c}"></i></span>
      <span class="n">${s.v} 萬</span>
    </div>`).join('');
  requestAnimationFrame(() => {
    document.querySelectorAll('#byService .bar i').forEach(b => b.style.width = b.dataset.w + '%');
  });
}

/* ---------------- 控制項 ---------------- */
document.getElementById('cmpBtn').onclick = e => {
  mode = mode === 'mom' ? 'yoy' : 'mom';
  const label = mode === 'mom' ? '上月' : '去年同期';
  e.currentTarget.textContent = '比較對象：' + label;
  e.currentTarget.setAttribute('aria-pressed', String(mode === 'yoy'));
  document.getElementById('cmpLabel').textContent = label;
  renderKpis();
};
document.getElementById('printBtn').onclick = () => print();

renderKpis();
